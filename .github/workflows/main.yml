name: Build Telegram Sender App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Android Code
      uses: actions/checkout@v3

    - name: Setup Java JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build APK (تجميع التطبيق)
      run: bash ./gradlew assembleDebug --stacktrace

    - name: Upload APK (رفع التطبيق الجاهز)
      uses: actions/upload-artifact@v3
      with:
        name: Hussain-App-Ready
        path: app/build/outputs/apk/debug/app-debug.apk
